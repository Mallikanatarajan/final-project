<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>CAPTCHA</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="captcha-box" id="captchaBox">

<div class="title">Verify you are human</div>

<div class="instruction" id="instruction"></div>

<div class="grid" id="grid"></div>

<div class="camera-section hidden" id="cameraSection">
<div class="camera-label">LIVE BEHAVIORAL ANALYSIS</div>
<img src="images/webcam_fake.jpg" class="camera-feed"/>
<div class="scan-text">
<p>Analyzing facial consistency...</p>
<p>Behavioral confidence: unstable</p>
<p class="legal-text">Simulated system</p>
</div>
</div>

<button id="verifyBtn">Verify</button>
<div class="message" id="message"></div>

</div>

<script src="script.js"></script>
</body>
</html>
